[mysql]
host = 127.0.0.1
port = 3306
user = root
password = 12345
database = tpm_database
table = work_requests

[import]
# Columna o columnas que forman la clave única. Usa auto para detectar work_request_key/work_request_no.
unique_keys = auto
# Si está vacío, importa todas las hojas.
sheet_names =
# Crea columnas faltantes automáticamente si auto_create_columns = yes
auto_create_columns = yes
# Tamaño de lote para inserts
batch_size = 500
# Formato de fecha preferido para normalizar fechas detectadas
date_format = %Y-%m-%d

[logging]
log_file = logs/importador.log
level = INFO
